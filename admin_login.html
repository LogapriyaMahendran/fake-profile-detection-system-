{% extends "base.html" %}

{% block title %}Admin Portal - Fake Profile Detection System{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="glass-card p-5" style="border-color: rgba(6, 182, 212, 0.2);">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-shield text-info mb-3" style="font-size: 3rem; filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.4));"></i>
                <h3 class="fw-bold text-white">Admin Portal</h3>
                <p class="text-secondary small">Access system administration and analytics dashboards</p>
            </div>
            
            <form action="{{ url_for('admin_login') }}" method="POST">
                <div class="mb-4">
                    <label for="username_or_email" class="form-label form-label-custom">Admin ID or Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-0 text-secondary"><i class="fa-solid fa-shield-halved"></i></span>
                        <input type="text" class="form-control form-control-custom" id="username_or_email" name="username_or_email" placeholder="Enter admin username" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label form-label-custom">Admin Key Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary border-0 text-secondary"><i class="fa-solid fa-key"></i></span>
                        <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="Enter security password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn w-100 py-3 mb-3 text-white fw-bold" style="background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); border: none; box-shadow: 0 4px 14px rgba(6, 182, 212, 0.3); border-radius: 10px;"><i class="fa-solid fa-unlock-keyhole me-2"></i>Authenticate Admin</button>
                
                <div class="text-center mt-3">
                    <p class="text-secondary small mb-0">Are you a regular user? <a href="{{ url_for('login') }}" class="text-indigo text-decoration-none" style="color: var(--primary);">User Login</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
